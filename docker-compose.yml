services:
  # --- Application Services ---

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env
    networks:
      - app-network
    environment:
      LOOTBOX_URL: "http://lootbox:3000"
      LITELLM_URL: "http://litellm:4000"

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
      args:
        - VITE_API_URL=http://localhost:4000/trpc
        - VITE_WS_URL=ws://localhost:4000
    ports:
      - "3000:80" 
    depends_on:
      - api
    networks:
      - app-network

  lootbox:
    image: jx-codes/lootbox
    networks:
      - app-network
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- AI Gateway ---
  
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: evaix_litellm_core
    ports:
      - "8080:4000"
    env_file:
      - .env
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml" ]
    networks:
      - app-network

  # --- EVAIX Mastra Tool Server (OpenAPI HTTP — connects to OpenWebUI Tools) ---

  evaix-tools:
    image: node:22-alpine
    container_name: evaix_mastra_tools
    working_dir: /app
    volumes:
      - ./packages/mcp-server-vfs:/app
      - /home/guy/EVAIX:/home/guy/EVAIX   # filesystem/git tools need repo access
    ports:
      - "9099:9099"
    environment:
      LITELLM_API_BASE: "http://litellm:4000/v1"
      LITELLM_MASTER_KEY: "sk-litellm-key"
      DEFAULT_AGENT_MODEL: "cerebras/gemma-4-31b"
      EVAIX_TOOLS_PORT: "9099"
    command: ["node", "dist/mcp-server.js"]
    networks:
      - app-network
    depends_on:
      - litellm

  # --- Backend Dependencies ---

  postgres:
    image: docker.io/pgvector/pgvector:pg15
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
