version: '3.8'

services:
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: evaix_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - app-network

  # 1. The Database for LiteLLM's UI (stores model configs, keys, teams, etc.)
  litellm-db:
    image: postgres:15-alpine
    container_name: evaix_litellm_db
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: litellm
    volumes:
      - litellm_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    networks:
      - app-network

  # 2. LiteLLM Gateway (DB-only mode — no config file mount)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: evaix_litellm_core
    ports:
      - "8080:4000" # OpenWebUI and EVAIX will talk to port 8080
    environment:
      - CORS_ALLOWED_ORIGINS=*
      - LITELLM_MASTER_KEY=sk-litellm-key
      - XAI_API_KEY=${XAI_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DATABASE_URL=postgresql://litellm:mysecretpassword@litellm-db:5432/litellm
      - STORE_MODEL_IN_DB=True
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    restart: always
    depends_on:
      - litellm-db
    networks:
      - app-network

  terminal:
    image: docker.io/tsl0922/ttyd:latest
    container_name: evaix_terminal
    ports:
      - "7681:7681"
    command: ttyd -W bash
    restart: always
    networks:
      - app-network

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: evaix_openwebui
    environment:
      - OPENAI_API_BASE_URL=http://evaix_litellm_core:4000
      - OPENAI_API_KEY=sk-litellm-master-key # Standard default to match litellm
      - WEBUI_AUTH=False
      - ENABLE_SIGNUP=False
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    restart: always
    networks:
      - app-network

  filebrowser:
    image: docker.io/filebrowser/filebrowser:latest
    container_name: evaix_filebrowser
    ports:
      - "8082:8080"
    volumes:
      - /home/guy/EVAIX:/srv:z # Mount the workspace directory (":z" needed for Fedora SELinux)
      - filebrowser_data:/database # Persist config/db
    command: ["--noauth", "--port", "8080"] # Disable login screen and set port
    restart: always
    networks:
      - app-network

volumes:
  redis_data:
  litellm_data:
  openwebui_data:
  filebrowser_data:

networks:
  app-network:
    driver: bridge