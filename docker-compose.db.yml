version: '3.8'

services:
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: evaix_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - app-network

  postgres:
    image: pgvector/pgvector:pg15
    env_file: .env
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: evaix_litellm_core
    ports:
      - "8080:4000"
    environment:
      - CORS_ALLOWED_ORIGINS=*
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://myuser:mypassword@postgres:5432/mydb
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:z
    command: [ "--config", "/app/config.yaml" ]
    restart: always
    depends_on:
      - postgres
    networks:
      - app-network

  terminal:
    image: docker.io/tsl0922/ttyd:latest
    container_name: evaix_terminal
    ports:
      - "7681:7681"
    command: ttyd -W bash
    restart: always
    networks:
      - app-network

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: evaix_openwebui
    environment:
      - OPENAI_API_BASE_URL=http://evaix_litellm_core:4000
      - OPENAI_API_KEY=sk-litellm-master-key # Standard default to match litellm
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    restart: always
    networks:
      - app-network

  filebrowser:
    image: docker.io/filebrowser/filebrowser:latest
    container_name: evaix_filebrowser
    ports:
      - "8082:8080"
    volumes:
      - /home/guy/EVAIX:/srv:z # Mount the workspace directory (":z" needed for Fedora SELinux)
      - filebrowser_data:/database # Persist config/db
    command: ["--noauth", "--port", "8080"] # Disable login screen and set port
    restart: always
    networks:
      - app-network

volumes:
  redis_data:
  postgres_data:
  openwebui_data:
  filebrowser_data:

networks:
  app-network:
    driver: bridge