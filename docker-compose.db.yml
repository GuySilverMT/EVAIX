version: '3.8'

services:
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: evaix_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - app-network

  # 1. The Database for LiteLLM's UI (stores model configs, keys, teams, etc.)
  litellm-db:
    image: postgres:15-alpine
    container_name: evaix_litellm_db
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: litellm
    volumes:
      - litellm_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    networks:
      - app-network

  # 2. LiteLLM Gateway (Stateless Config mode)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: evaix_litellm_core
    command: ["--config", "/app/config.yaml"]
    ports:
      - "8080:4000" # OpenWebUI and EVAIX will talk to port 8080
    environment:
      - CORS_ALLOWED_ORIGINS=*
      - LITELLM_MASTER_KEY=sk-litellm-key
      - XAI_API_KEY=${XAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    restart: always
    networks:
      - app-network

  terminal:
    image: docker.io/tsl0922/ttyd:latest
    container_name: evaix_terminal
    ports:
      - "7681:7681"
    command: ttyd -W bash
    restart: always
    networks:
      - app-network

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: evaix_openwebui
    environment:
      # Redirect traffic to the host gateway where EVAIX API is listening on port 4000
      - OPENAI_API_BASE_URL=http://host.docker.internal:4000/api/v1
      - OPENAI_API_KEY=sk-litellm-key # Fixed key mismatch
      - WEBUI_AUTH=False
      - ENABLE_SIGNUP=False
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    restart: always
    networks:
      - app-network

  filebrowser:
    image: docker.io/filebrowser/filebrowser:latest
    container_name: evaix_filebrowser
    ports:
      - "8082:8080"
    volumes:
      - /home/guy/EVAIX:/srv:z # Mount the workspace directory (":z" needed for Fedora SELinux)
      - filebrowser_data:/database # Persist config/db
    command: ["--noauth", "--port", "8080"] # Disable login screen and set port
    restart: always
    networks:
      - app-network

  # NOTE: The EVAIX Mastra Tool Server (port 9099) runs as a HOST process,
  # not a container. Heavy Mastra/AI-SDK modules OOM inside Alpine.
  # It is started automatically by run-desktop.sh before Podman comes up.
  # OpenWebUI connects to it via: http://host.docker.internal:9099

volumes:
  redis_data:
  litellm_data:
  openwebui_data:
  filebrowser_data:

networks:
  app-network:
    driver: bridge